<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="Lawrence Scott's personal landing page with links to LinkedIn and Bluesky."
    >
    <meta name="theme-color" content="#07111f">
    <link rel="canonical" href="https://lascott.net/">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://lascott.net/">
    <meta property="og:title" content="Lawrence Scott">
    <meta
      property="og:description"
      content="Connect with Lawrence Scott on LinkedIn and Bluesky."
    >
    <meta property="og:image" content="https://lascott.net/profile.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lawrence Scott">
    <meta
      name="twitter:description"
      content="Connect with Lawrence Scott on LinkedIn and Bluesky."
    >
    <meta name="twitter:image" content="https://lascott.net/profile.png">
    <title>Lawrence Scott</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="manifest" href="site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@500;650;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="stage" aria-label="Personal landing page">
      <div class="aurora aurora-one" aria-hidden="true"></div>
      <div class="aurora aurora-two" aria-hidden="true"></div>
      <div class="grain" aria-hidden="true"></div>

      <section class="landing-card">
        <div class="portrait-shell">
          <img
            class="portrait"
            src="profile.png"
            alt="Profile illustration"
            width="990"
            height="1088"
          >
        </div>

        <div class="identity-panel">
          <h1>Lawrence Scott</h1>
          <nav class="link-box" aria-label="Social profile links">
            <a
              class="link-pill linkedin"
              href="https://www.linkedin.com/in/larryscott80/"
              rel="me noopener"
              target="_blank"
            >
              <span>LinkedIn</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7.5 17.25 16.75 8m0 0H9.5m7.25 0v7.25" />
              </svg>
            </a>
            <a
              class="link-pill bluesky"
              href="https://bsky.app/profile/lawrencescott.bsky.social"
              rel="me noopener"
              target="_blank"
            >
              <span>Bluesky</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7.5 17.25 16.75 8m0 0H9.5m7.25 0v7.25" />
              </svg>
            </a>
          </nav>
        </div>
      </section>
    </main>
  </body>
</html>
